name: autoclean

on:
  push:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  prune-build-runs:
    name: Keep latest build runs
    runs-on: ubuntu-latest
    steps:
      - name: Delete old successful build runs
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'build.yml';
            const keep = 3;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              status: 'completed',
              per_page: 100,
            });

            const successfulRuns = runs
              .filter((run) => run.conclusion === 'success')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            for (const run of successfulRuns.slice(keep)) {
              core.info(`Deleting build run ${run.id} from ${run.created_at}`);
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
            }
